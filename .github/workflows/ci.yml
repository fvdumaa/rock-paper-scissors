---
name: Validate Workflow

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python to install yamllint
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate workflow YAML
        run: yamllint .github/workflows/ci.yml

      - name: Check project files exist
        run: |
          test -f index.html
          test -d scripts
          test -f style.css
          echo "Validation passed!"

  test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run game logic tests
        run: |
          node --experimental-specifier-resolution=node scripts/rulesRunner.js
