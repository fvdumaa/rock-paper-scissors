---
name: Validate Workflow

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # <-- forces Node 24 for all JS actions (gits rid of warning in workflow)

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python to install yamllint
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate workflow YAML
        run: yamllint .github/workflows/ci.yml

      - name: Check project files exist
        run: |
          test -f index.html
          test -d scripts
          test -f style.css
          echo "Validation passed!"

  test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run game logic tests
        run: |
          node --experimental-specifier-resolution=node scripts/rulesRunner.js

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create tar.gz package
        run: |
          tar -czf rock-paper-scissors.tar.gz \
            index.html style.css scripts
          echo "Package created: rock-paper-scissors.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rock-paper-scissors
          path: rock-paper-scissors.tar.gz

  docker:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t rock-paper-scissors:latest .
  
  deploy:
  runs-on: ubuntu-latest
  needs: docker
  if: github.ref == 'refs/heads/main'  # Only run on main branch
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Deploy (dry run)
      run: |
        echo "Starting deploy dry run..."
        echo "This is a simulation — nothing is actually deployed."
        # Example: pretend to push Docker image
        echo "docker push rock-paper-scissors:latest --dry-run"
        echo "Dry run complete."
